    :root {

* {

/* 新增：定义从下方滑出的关键帧动画 */
@keyframes slideUp {
  from {
    transform: translateY(100%); /* 初始位置：向下偏移100% */
    opacity: 0;
  }
  to {
    transform: translateY(0); /* 结束位置：回到原位置 */
    opacity: 1;
  }
}
.container {
  max-width: 800px;
  text-align: center;
  padding: 40px;
  border-radius: 16px;
  background: transparent;
  box-shadow: none;
  color: var(--text);
  animation: slideUp 0.8s ease-out forwards;
}
/* 取消第二个container的动画 */
.container:nth-child(2) {
  animation: none; /* 覆盖原有动画，取消效果 */
}
h1 {
  font-family: 'Zhi Mang Xing', cursive;
  font-size: 3rem;

}
a:hover {

}
.links {
  display: flex;
  flex-direction: column;
  gap: 1rem;
  margin-bottom: 2rem;
}
/* 动画按钮样式 */
.btn-53,
.btn-53 *,
.btn-53 :after,
.btn-53 :before,
.btn-53:after,
.btn-53:before {
  border: 0 solid;
  box-sizing: border-box;
}

.btn-53 {
  -webkit-tap-highlight-color: transparent;
  appearance: button;
  background-color: #000;
  background-image: none;
  color: #fff;
  cursor: pointer;
  font-family: 'Noto Serif SC', serif;
  font-size: 100%;
  line-height: 1.5;
  margin: 0;
  mask-image: radial-gradient(#000, #fff);
  -webkit-mask-image: radial-gradient(#000, #fff);
  padding: 0;
  border: 1px solid #ffffff;
  border-radius: 999px;
  box-sizing: border-box;
  display: block;
  font-weight: 900;
  overflow: hidden;
  padding: 0.6rem 1.5rem;
  position: relative;
  text-transform: uppercase;
  margin-bottom: 1rem;
}

.btn-53:disabled {
  cursor: default;
}

.btn-53:-moz-focusring {
  outline: auto;
}

.btn-53 svg {
  display: block;
}

.btn-53 [hidden] {
  display: none;
}

.btn-53 .original {
  background: #fff;
  color: #000;
  display: grid;
  inset: 0;
  place-content: center;
  position: absolute;
  transition: transform 0.2s cubic-bezier(0.87, 0, 0.13, 1);
}

.btn-53:hover .original {
  transform: translateY(100%);
}

.btn-53 .letters {
  display: inline-flex;
}

.btn-53 .letters span {
  opacity: 0;
  transform: translateY(-15px);
  transition: transform 0.2s cubic-bezier(0.87, 0, 0.13, 1), opacity 0.2s;
}

.btn-53 .letters span:nth-child(2n) {
  transform: translateY(15px);
}

.btn-53:hover .letters span {
  opacity: 1;
  transform: translateY(0);
}

.btn-53:hover .letters span:nth-child(2) {
  transition-delay: 0.1s;
}

.btn-53:hover .letters span:nth-child(3) {
  transition-delay: 0.2s;
}

.btn-53:hover .letters span:nth-child(4) {
  transition-delay: 0.3s;
}

.btn-53:hover .letters span:nth-child(5) {
  transition-delay: 0.4s;
}

.btn-53:hover .letters span:nth-child(6) {
  transition-delay: 0.5s;
}
.footer {
